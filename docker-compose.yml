services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kenko
      POSTGRES_PASSWORD: kenko
      POSTGRES_DB: kenko
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kenko"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - backend
      - redis
    command: celery -A app.celery_app worker --loglevel=info

  celery-beat:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - celery
    command: celery -A app.celery_app beat --loglevel=info

  flower:
    build: ./backend
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - celery
    command: celery -A app.celery_app flower --port=5555

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads:
